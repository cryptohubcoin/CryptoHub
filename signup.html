<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create an account — CryptoHubCoin</title>
<meta name="description" content="Create your CryptoHubCoin account to access market data, predictions, and APIs.">
<link rel="icon" href="/logo.png" type="image/png">

<style>
  :root {
    --bg1: #fff; --bg2: #f8fafd; --bg3: #eff2f5;
    --t1: #222531; --t2: #616e85;
    --bc: #eff2f5; --ac: #3861fb; --hv: #f0f6ff;
    --gn: #16c784; --rd: #ea3943;
  }
  .dark {
    --bg1: #0d1421; --bg2: #171d2e; --bg3: #1e2738;
    --t1: #e8eaed; --t2: #8a919e;
    --bc: #1e2738; --ac: #5b7cfa; --hv: #1a2540;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg1);
    color: var(--t1);
    font-family: 'Inter', 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .auth-card {
    background: var(--bg2);
    border-radius: 12px;
    border: 0.5px solid var(--bc);
    padding: 2rem 1.75rem;
    width: 100%;
    max-width: 420px;
  }
  .brand {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .brand-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    text-decoration: none;
    color: inherit;
  }
  .brand-logo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #185FA5, #BA7517);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 500;
    font-size: 13px;
  }
  .brand-name { font-size: 16px; font-weight: 500; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px; }
  .subtitle { font-size: 13px; color: var(--t2); margin: 0; }

  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg3);
    border: 0.5px solid var(--bc);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--t1);
    text-decoration: none;
  }
  .btn-google:hover { background: var(--hv); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.25rem 0;
  }
  .divider-line { flex: 1; height: 0.5px; background: var(--bc); }
  .divider-text { font-size: 11px; color: var(--t2); letter-spacing: 0.05em; }

  .field { margin-bottom: 12px; }
  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  label {
    font-size: 12px;
    color: var(--t2);
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
  }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg1);
    border: 0.5px solid var(--bc);
    border-radius: 6px;
    color: var(--t1);
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input:focus {
    outline: none;
    border-color: var(--ac);
    box-shadow: 0 0 0 3px rgba(91, 124, 250, 0.1);
  }
  .hint {
    font-size: 11px;
    color: var(--t2);
    margin: 0 0 1rem;
  }

  .btn-primary {
    width: 100%;
    padding: 10px;
    background: var(--ac);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .legal {
    font-size: 11px;
    color: var(--t2);
    text-align: center;
    margin: 12px 0 0;
    line-height: 1.5;
  }
  .legal a { color: var(--ac); text-decoration: none; }
  .legal a:hover { text-decoration: underline; }

  .footer-link {
    border-top: 0.5px solid var(--bc);
    padding-top: 14px;
    text-align: center;
    margin-top: 1.25rem;
  }
  .footer-link span { font-size: 13px; color: var(--t2); }
  .footer-link a {
    font-size: 13px;
    color: var(--ac);
    text-decoration: none;
    font-weight: 500;
  }
  .footer-link a:hover { text-decoration: underline; }

  .alert {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 14px;
    display: none;
  }
  .alert.show { display: block; }
  .alert-error {
    background: rgba(234, 57, 67, 0.1);
    color: var(--rd);
    border: 0.5px solid rgba(234, 57, 67, 0.3);
  }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-inline-end: 40px; }
  .pw-toggle {
    position: absolute; top: 50%; inset-inline-end: 8px;
    transform: translateY(-50%); background: none; border: none;
    padding: 4px; cursor: pointer; color: var(--t2);
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
  }
  .pw-toggle:hover { color: var(--t1); }

  /* Auto dark-mode if system prefers, unless explicitly set */
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) body { background: #0d1421; color: #e8eaed; }
    html:not([data-theme="light"]) {
      --bg1: #0d1421; --bg2: #171d2e; --bg3: #1e2738;
      --t1: #e8eaed; --t2: #8a919e;
      --bc: #1e2738; --ac: #5b7cfa; --hv: #1a2540;
    }
  }
</style>
</head>
<body>

<main class="auth-card">

  <div class="brand">
    <a href="/" class="brand-row">
      <span class="brand-logo">CH</span>
      <span class="brand-name">CryptoHubCoin</span>
    </a>
    <h1>Create an account</h1>
    <p class="subtitle">Access market data, predictions, and APIs</p>
  </div>

  <div id="alert" class="alert alert-error"></div>

  <a class="btn-google" href="https://api.cryptohubcoin.com/api/auth/google">
    <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Sign up with Google
  </a>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">OR</span>
    <div class="divider-line"></div>
  </div>

  <form id="signup-form" novalidate>

    <div class="field">
      <label for="full_name">Full name</label>
      <input id="full_name" name="full_name" type="text" autocomplete="name" required maxlength="100">
    </div>

    <div class="field">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="email" required maxlength="254">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" maxlength="128">
        <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
          <svg id="pw-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="hint">Minimum 8 characters</p>
    </div>

    <button type="submit" class="btn-primary" id="submit-btn">Continue</button>

    <p class="legal">
      By continuing, you agree to our <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>
    </p>

  </form>

  <div class="footer-link">
    <span>Have an account? </span>
    <a href="/login.html">Sign in</a>
  </div>

</main>

<script>
  const API_URL = 'https://api.cryptohubcoin.com';
  const form = document.getElementById('signup-form');
  const submitBtn = document.getElementById('submit-btn');
  const alertBox = document.getElementById('alert');

  // Password show/hide toggle
  (function () {
    var toggle = document.getElementById('pw-toggle');
    var pw = document.getElementById('password');
    var eye = document.getElementById('pw-eye');
    if (toggle && pw) {
      toggle.addEventListener('click', function () {
        var show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        toggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        eye.innerHTML = show
          ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      });
    }
  })();

  function showError(message) {
    alertBox.textContent = message;
    alertBox.className = 'alert alert-error show';
  }

  function clearError() {
    alertBox.className = 'alert alert-error';
    alertBox.textContent = '';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const data = {
      full_name: form.full_name.value.trim(),
      email: form.email.value.trim().toLowerCase(),
      password: form.password.value,
    };

    if (!data.email || !data.password) {
      showError('Please fill in all required fields');
      return;
    }
    if (data.password.length < 8) {
      showError('Password must be at least 8 characters');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';

    try {
      const res = await fetch(`${API_URL}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(data),
      });

      const json = await res.json();

      if (!res.ok || !json.success) {
        showError(json.error || 'Could not create account. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue';
        return;
      }

      // Success — redirect to verify-email page
      window.location.href = `/verify-email.html?pending=1&email=${encodeURIComponent(data.email)}`;
    } catch (err) {
      showError('Network error. Please check your connection.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Continue';
    }
  });
</script>

</body>
</html>
