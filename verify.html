<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifying your email - CryptoHubCoin</title>
<link rel="icon" href="/logo.png" type="image/png">
<style>
  :root {
    --bg1: #fff; --bg2: #f8fafd; --bg3: #eff2f5;
    --t1: #222531; --t2: #616e85;
    --bc: #eff2f5; --ac: #3861fb; --hv: #f0f6ff;
    --gn: #16c784; --rd: #ea3943;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg1); color: var(--t1);
    font-family: 'Inter', 'Cairo', -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 1.5rem;
  }
  .card {
    background: var(--bg2); border-radius: 12px;
    border: 0.5px solid var(--bc); padding: 2.5rem 1.75rem;
    width: 100%; max-width: 420px; text-align: center;
  }
  .brand-row {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 1.5rem; text-decoration: none; color: inherit;
  }
  .brand-logo {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #185FA5, #BA7517);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 13px;
  }
  .brand-name { font-size: 16px; font-weight: 500; }
  .icon-circle {
    width: 56px; height: 56px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
  }
  .icon-pending { background: rgba(56, 97, 251, 0.12); }
  .icon-success { background: rgba(22, 199, 132, 0.15); }
  .icon-error   { background: rgba(234, 57, 67, 0.15); }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 8px; }
  .desc { font-size: 13px; color: var(--t2); margin: 0 0 1.5rem; line-height: 1.6; }
  .spinner {
    width: 26px; height: 26px; border-radius: 50%;
    border: 3px solid rgba(56,97,251,0.25); border-top-color: var(--ac);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-primary {
    display: inline-block; width: 100%; padding: 10px;
    background: var(--ac); color: white; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: inherit; text-decoration: none;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-secondary {
    display: inline-block; width: 100%; padding: 10px; margin-top: 8px;
    background: transparent; color: var(--t1);
    border: 0.5px solid var(--bc); border-radius: 6px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: inherit; text-decoration: none;
  }
  .btn-secondary:hover { background: var(--bg3); }
  .state { display: none; }
  .state.show { display: block; }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) {
      --bg1: #0d1421; --bg2: #171d2e; --bg3: #1e2738;
      --t1: #e8eaed; --t2: #8a919e;
      --bc: #1e2738; --ac: #5b7cfa; --hv: #1a2540;
    }
    html:not([data-theme="light"]) body { background: #0d1421; color: #e8eaed; }
  }
</style>
</head>
<body>

<main class="card">
  <a href="/" class="brand-row">
    <span class="brand-logo">CH</span>
    <span class="brand-name">CryptoHubCoin</span>
  </a>

  <div id="state-pending" class="state show">
    <div class="icon-circle icon-pending"><div class="spinner"></div></div>
    <h1>Verifying your email&hellip;</h1>
    <p class="desc">Just a moment while we activate your account.</p>
  </div>

  <div id="state-success" class="state">
    <div class="icon-circle icon-success">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16c784" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Email confirmed</h1>
    <p class="desc">Your account is now active. Redirecting you to the homepage&hellip;</p>
    <a href="/" class="btn-primary">Go to homepage now</a>
  </div>

  <div id="state-error" class="state">
    <div class="icon-circle icon-error">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ea3943" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h1 id="err-title">Verification failed</h1>
    <p class="desc" id="err-desc">This link is invalid or has expired.</p>
    <a href="/login.html" class="btn-primary">Go to sign in</a>
    <a href="/" class="btn-secondary">Back to homepage</a>
  </div>
</main>

<script>
  var API_URL = 'https://api.cryptohubcoin.com';
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');

  var states = {
    pending: document.getElementById('state-pending'),
    success: document.getElementById('state-success'),
    error: document.getElementById('state-error')
  };
  function show(key) {
    Object.keys(states).forEach(function (k) { states[k].classList.remove('show'); });
    states[key].classList.add('show');
  }
  function showError(code) {
    var title = document.getElementById('err-title');
    var desc = document.getElementById('err-desc');
    if (code === 'expired') {
      title.textContent = 'Link expired';
      desc.textContent = 'This verification link is no longer valid. Please request a new one.';
    } else if (code === 'already_used') {
      title.textContent = 'Already verified';
      desc.textContent = 'This account is already verified. You can sign in normally.';
    } else {
      title.textContent = 'Invalid link';
      desc.textContent = 'This verification link is not recognized.';
    }
    show('error');
  }

  (async function () {
    if (!token) { showError('missing_token'); return; }
    try {
      var res = await fetch(API_URL + '/api/auth/verify-email?token=' + encodeURIComponent(token), {
        method: 'GET',
        credentials: 'include'
      });
      var data = await res.json().catch(function () { return null; });
      if (res.ok && data && data.success) {
        show('success');
        setTimeout(function () { window.location.href = '/?verified=1'; }, 2000);
      } else {
        showError(data && data.error ? data.error : 'invalid');
      }
    } catch (e) {
      showError('invalid');
    }
  })();
</script>

</body>
</html>
