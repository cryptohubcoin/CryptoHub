// worker.js - Backward Compatible + KV Static Assets
export default {
  async fetch(request, env, ctx) {
    const url = new URL(request.url);
    
    // ========== API Routes (دايماً شغالة) ==========
    if (url.pathname.startsWith('/api/')) {
      return handleAPI(request, env);
    }
    
    // ========== Static Files (لو فيه KV بس) ==========
    // Check if KV binding exists (STATIC_ASSETS)
    if (env?.STATIC_ASSETS) {
      try {
        let path = url.pathname;
        
        // Default to index.html
        if (path === '/' || path === '') {
          path = '/index.html';
        }
        
        // Try exact path first
        let asset = await env.STATIC_ASSETS.get(path, 'arrayBuffer');
        
        // If not found and no extension, try .html
        if (!asset && !path.includes('.', path.lastIndexOf('/'))) {
          asset = await env.STATIC_ASSETS.get(path + '.html', 'arrayBuffer');
        }
        
        if (asset) {
          return new Response(asset, {
            headers: { 
              'Content-Type': getContentType(path),
              'Cache-Control': 'public, max-age=3600'
            }
          });
        }
      } catch (e) {
        // KV error - silent fail, continue to 404
        console.error('KV Error:', e);
      }
    }
    
    // ========== Fallback 404 ==========
    return new Response('Not Found', { status: 404 });
  }
};

// API Handler
async function handleAPI(request, env) {
  const url = new URL(request.url);
  
  // Health check
  if (url.pathname === '/api/health') {
    return jsonResponse({ 
      status: 'ok', 
      kv_connected: !!env?.STATIC_ASSETS 
    });
  }
  
  // Your existing API logic here...
  return jsonResponse({ message: 'API working' });
}

// Helpers
function jsonResponse(data, status = 200) {
  return new Response(JSON.stringify(data), {
    status,
    headers: { 'Content-Type': 'application/json' }
  });
}

function getContentType(path) {
  const ext = path.split('.').pop()?.toLowerCase() || '';
  const types = {
    html: 'text/html; charset=utf-8',
    css: 'text/css',
    js: 'application/javascript',
    json: 'application/json',
    png: 'image/png',
    jpg: 'image/jpeg',
    jpeg: 'image/jpeg',
    gif: 'image/gif',
    svg: 'image/svg+xml',
    ico: 'image/x-icon',
    xml: 'application/xml',
    txt: 'text/plain'
  };
  return types[ext] || 'application/octet-stream';
}
