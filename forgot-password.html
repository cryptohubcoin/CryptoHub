<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password - CryptoHubCoin</title>
<link rel="icon" href="/logo.png" type="image/png">

<style>
  :root {
    --bg1: #fff; --bg2: #f8fafd; --bg3: #eff2f5;
    --t1: #222531; --t2: #616e85;
    --bc: #eff2f5; --ac: #3861fb; --hv: #f0f6ff;
    --gn: #16c784; --rd: #ea3943;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg1); color: var(--t1);
    font-family: 'Inter', 'Cairo', -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 1.5rem;
  }
  .auth-card {
    background: var(--bg2); border-radius: 12px;
    border: 0.5px solid var(--bc); padding: 2rem 1.75rem;
    width: 100%; max-width: 420px;
  }
  .brand { text-align: center; margin-bottom: 1.5rem; }
  .brand-row {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 1rem; text-decoration: none; color: inherit;
  }
  .brand-logo {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #185FA5, #BA7517);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 500; font-size: 13px;
  }
  .brand-name { font-size: 16px; font-weight: 500; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px; text-align: center; }
  .subtitle {
    font-size: 13px; color: var(--t2); margin: 0;
    text-align: center; line-height: 1.5;
  }
  .field { margin-bottom: 12px; margin-top: 1.5rem; }
  label {
    font-size: 12px; color: var(--t2); display: block;
    margin-bottom: 4px; font-weight: 500;
  }
  input[type="email"] {
    width: 100%; padding: 9px 12px; background: var(--bg1);
    border: 0.5px solid var(--bc); border-radius: 6px;
    color: var(--t1); font-size: 13px; font-family: inherit;
  }
  input:focus {
    outline: none; border-color: var(--ac);
    box-shadow: 0 0 0 3px rgba(91, 124, 250, 0.1);
  }
  .btn-primary {
    width: 100%; padding: 10px; background: var(--ac); color: white;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .footer-link { text-align: center; margin-top: 1.25rem; }
  .footer-link a {
    font-size: 13px; color: var(--t2); text-decoration: none;
  }
  .footer-link a:hover { color: var(--ac); }
  .alert {
    padding: 10px 12px; border-radius: 6px; font-size: 12px;
    margin-bottom: 14px; display: none;
  }
  .alert.show { display: block; }
  .alert-error {
    background: rgba(234, 57, 67, 0.1); color: var(--rd);
    border: 0.5px solid rgba(234, 57, 67, 0.3);
  }
  .alert-success {
    background: rgba(22, 199, 132, 0.1); color: var(--gn);
    border: 0.5px solid rgba(22, 199, 132, 0.3);
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) {
      --bg1: #0d1421; --bg2: #171d2e; --bg3: #1e2738;
      --t1: #e8eaed; --t2: #8a919e;
      --bc: #1e2738; --ac: #5b7cfa; --hv: #1a2540;
    }
    html:not([data-theme="light"]) body { background: #0d1421; color: #e8eaed; }
  }
</style>
</head>
<body>

<main class="auth-card">

  <div class="brand">
    <a href="/" class="brand-row">
      <span class="brand-logo">CH</span>
      <span class="brand-name">CryptoHubCoin</span>
    </a>
  </div>

  <h1>Reset password</h1>
  <p class="subtitle">Enter your account email to receive a password reset link</p>

  <div id="alert-success" class="alert alert-success"></div>
  <div id="alert-error" class="alert alert-error"></div>

  <form id="forgot-form" novalidate>
    <div class="field">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="email" required>
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">Send reset link</button>
  </form>

  <div class="footer-link">
    <a href="/login.html">Return to sign in</a>
  </div>

</main>

<script>
  const API_URL = 'https://api.cryptohubcoin.com';
  const form = document.getElementById('forgot-form');
  const submitBtn = document.getElementById('submit-btn');
  const alertError = document.getElementById('alert-error');
  const alertSuccess = document.getElementById('alert-success');

  function showError(message) {
    alertSuccess.classList.remove('show');
    alertError.textContent = message;
    alertError.classList.add('show');
  }

  function showSuccess(message) {
    alertError.classList.remove('show');
    alertSuccess.textContent = message;
    alertSuccess.classList.add('show');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertError.classList.remove('show');
    alertSuccess.classList.remove('show');

    const email = form.email.value.trim().toLowerCase();
    if (!email) {
      showError('Please enter your email address');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    try {
      const res = await fetch(API_URL + '/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email }),
      });
      const json = await res.json();

      if (!res.ok || !json.success) {
        showError(json.error || 'Could not send reset email. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send reset link';
        return;
      }

      showSuccess('If an account exists, a password reset link has been sent. Check your inbox.');
      form.email.value = '';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reset link';
    } catch (err) {
      showError('Network error. Please check your connection.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reset link';
    }
  });
</script>

</body>
</html>
